<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>외계인들 (ALIENS) - Cosmic Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Orbitron:wght@500;700&family=Noto+Sans+KR:wght@300;500;800&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-color: #060214;
        --card-bg: rgba(18, 11, 38, 0.75);
        --neon-purple: #bd00ff;
        --neon-cyan: #00f0ff;
        --neon-pink: #ff0077;
        --text-color: #f0edff;
        --text-muted: #aaa5c3;
    }

    body { 
        font-family: 'Noto Sans KR', sans-serif; 
        background-color: var(--bg-color); 
        color: var(--text-color); 
        margin: 0; 
        padding: 0; 
        overflow-x: hidden;
        /* 깊은 우주 성운 및 별빛 배경 효과 */
        background-image: 
            radial-gradient(circle at 20% 30%, rgba(189, 0, 255, 0.15) 0%, transparent 40%),
            radial-gradient(circle at 80% 70%, rgba(0, 240, 255, 0.12) 0%, transparent 40%),
            radial-gradient(white, rgba(255,255,255,.2) 1.5px, transparent 30px),
            radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 20px);
        background-size: 100% 100%, 100% 100%, 450px 450px, 300px 300px;
        background-position: 0 0, 0 0, 0 0, 50px 50px;
        background-attachment: fixed;
    }

    /* Navigation Header */
    header { 
        padding: 1rem 4rem; 
        box-sizing: border-box; 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        border-bottom: 1px solid rgba(189, 0, 255, 0.25);
        background: rgba(6, 2, 20, 0.85);
        backdrop-filter: blur(10px);
        position: sticky; top: 0; z-index: 100;
    }
    .logo-container { display: flex; flex-direction: column; cursor: pointer; }
    .logo-main {
        font-family: 'Alex Brush', cursive; font-size: 3.5rem; color: #fff;
        text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-purple); line-height: 0.8; margin: 0;
    }
    .logo-sub {
        font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.8rem; letter-spacing: 6px;
        color: var(--neon-cyan); margin-top: 6px; text-shadow: 0 0 5px rgba(0, 240, 255, 0.5);
    }
    .nav-links { display: flex; gap: 20px; align-items: center; }
    .nav-link { 
        color: #ffffff; text-decoration: none; font-size: 14px; font-weight: 500; letter-spacing: 1px; cursor: pointer;
        transition: all 0.3s;
    }
    .nav-link:hover, .nav-link.active { color: var(--neon-cyan); text-shadow: 0 0 8px var(--neon-cyan); }

    /* 언어 토글 버튼 */
    .lang-btn {
        background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
        color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold;
        cursor: pointer; transition: all 0.3s ease; font-family: 'Orbitron', sans-serif;
    }
    .lang-btn:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 240, 255, 0.3); }

    /* 편집자 인증 구역 */
    .admin-zone { display: flex; gap: 8px; align-items: center; }
    input, button, select, textarea {
        background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(0, 240, 255, 0.3);
        color: #fff; padding: 10px 14px; border-radius: 8px; outline: none; font-family: inherit; font-size: 14px;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--neon-cyan); box-shadow: 0 0 12px rgba(0, 240, 255, 0.5); background: rgba(14, 8, 32, 0.95); }
    button {
        cursor: pointer; background: linear-gradient(45deg, var(--neon-purple), var(--neon-cyan));
        border: none; font-weight: bold; letter-spacing: 1px; transition: all 0.3s ease;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 0 15px var(--neon-cyan); }

    /* Hero Section */
    .hero { height: 180px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    .hero h1 { font-family: 'Orbitron', sans-serif; font-size: 3.5rem; margin: 0; letter-spacing: 4px; color: #fff; text-shadow: 0 0 20px var(--neon-purple); }
    .hero p { font-weight: 300; letter-spacing: 6px; text-transform: uppercase; font-size: 12px; margin: 8px 0 0 0; color: var(--neon-cyan); }

    /* Main Container */
    .container { max-width: 1200px; margin: 0 auto 60px; padding: 0 20px; }

    /* Views 제어 */
    .view { display: none; animation: fadeIn 0.5s ease; }
    .view.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    /* --- [MAIN PAGE STYLE] --- */
    .intro-section {
        background: var(--card-bg); border: 1px solid rgba(189, 0, 255, 0.3); padding: 40px; border-radius: 20px;
        box-shadow: 0 0 30px rgba(189, 0, 255, 0.1); margin-bottom: 50px; text-align: center; backdrop-filter: blur(8px);
    }
    .section-title {
        font-family: 'Orbitron', sans-serif; font-size: 24px; color: var(--neon-cyan); margin-top: 0; margin-bottom: 25px;
        text-shadow: 0 0 8px var(--neon-cyan); letter-spacing: 2px;
    }
    .intro-text { font-size: 16px; line-height: 1.9; color: #dbd7f4; white-space: pre-line; word-break: keep-all; max-width: 900px; margin: 0 auto; }

    .profile-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-bottom: 60px; }
    .profile-card {
        background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08); padding: 30px; border-radius: 16px;
        transition: all 0.3s; position: relative; overflow: hidden;
    }
    .profile-card::before {
        content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--neon-purple); transition: all 0.3s;
    }
    .profile-card:hover { transform: translateY(-5px); background: rgba(18, 11, 38, 0.5); border-color: var(--neon-purple); box-shadow: 0 5px 20px rgba(189,0,255,0.2); }
    .profile-card:hover::before { background: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); }
    .profile-name { font-size: 22px; font-weight: 800; margin: 0 0 5px 0; color: #fff; display: flex; align-items: center; gap: 10px; }
    .profile-role { font-family: 'Orbitron', sans-serif; font-size: 12px; color: var(--neon-cyan); letter-spacing: 1px; margin-bottom: 15px; text-transform: uppercase; }
    .profile-desc { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin: 0; }

    /* 섹션 아카이브 그리드 */
    .section-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 30px; }
    .section-card {
        background: var(--card-bg); border: 1px solid rgba(0, 240, 255, 0.2); border-radius: 16px; padding: 35px;
        cursor: pointer; transition: all 0.3s ease; display: flex; flex-direction: column; justify-content: space-between; height: 180px;
    }
    .section-card:hover { border-color: var(--neon-pink); transform: scale(1.02); box-shadow: 0 0 25px rgba(255, 0, 119, 0.3); }
    .section-card h3 { font-size: 22px; margin: 0 0 10px 0; color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.2); }
    .section-card p { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin: 0; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .enter-txt { font-size:12px; color:var(--neon-cyan); font-family:'Orbitron', sans-serif; text-align:right; margin-top:10px; }
    
    /* --- [VIDEO GRID & DETAIL STYLE] --- */
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 35px; }
    .video-card { 
        background: var(--card-bg); border-radius: 12px; overflow: hidden; cursor: pointer; transition: all 0.3s ease; 
        border: 1px solid rgba(255, 255, 255, 0.08); display: flex; flex-direction: column; 
    }
    .video-card:hover { transform: translateY(-8px); border-color: var(--neon-cyan); box-shadow: 0 10px 25px rgba(0, 240, 255, 0.25); }
    .thumbnail-container { width: 100%; height: 190px; background-color: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .thumbnail { width: 100%; height: 100%; object-fit: cover; }
    .card-info { padding: 20px; }
    .card-info h3 { margin: 0 0 8px 0; font-size: 17px; font-weight: 600; color: #fff; }
    .card-info p { margin: 0; color: var(--text-muted); font-size: 13px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* 상세 페이지 구조 */
    .detail-wrapper { background: var(--card-bg); padding: 40px; border-radius: 16px; border: 1px solid rgba(189, 0, 255, 0.2); box-shadow: 0 0 30px rgba(189, 0, 255, 0.1); }
    .detail-video-container { width: 100%; background: #000; aspect-ratio: 16/9; display: flex; justify-content: center; align-items: center; border-radius: 8px; overflow: hidden; margin-bottom: 30px; border: 1px solid rgba(0, 240, 255, 0.2); }
    .detail-video-container iframe { width: 100%; height: 100%; border: none; }
    .detail-info { text-align: center; max-width: 800px; margin: 0 auto; }
    .detail-info h2 { font-size: 26px; color: #fff; margin-bottom: 15px; font-weight: 600; }
    .detail-info p { color: #dbd7f4; line-height: 1.8; font-size: 14px; white-space: pre-wrap; text-align: left; }
    
    .btn-outline { background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); padding: 8px 20px; border-radius: 20px; font-weight: bold;}
    .btn-outline:hover { background: var(--neon-cyan); color: #060214; box-shadow: 0 0 15px var(--neon-cyan); }
    .btn-danger { background: rgba(231, 76, 60, 0.15); border: 1px solid #e74c3c; color: #e74c3c; margin-top: 30px; padding: 10px 25px; border-radius: 20px; font-weight: bold;}
    .btn-danger:hover { background: #e74c3c; color: white; box-shadow: 0
